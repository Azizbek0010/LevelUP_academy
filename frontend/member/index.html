<!doctype html>
<html lang="ru" data-theme="levelup">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!--
      Only /login is public and indexable. The cabinet behind it holds personal
      student/parent data and stays out of the index via robots.txt (Disallow all but
      /login) and the X-Robots-Tag header (vercel.json, noindex on every path except
      /login). No meta robots here: single index.html for every SPA route, so a static
      tag could not target only the login page.
    -->
    <meta
      name="description"
      content="Вход в личный кабинет LevelUp Academy для учеников и родителей — по логин-коду и паролю."
    />
    <link rel="icon" type="image/svg+xml" href="/logo-mark.svg" />
    <title>Вход — LevelUp Academy для ученика и родителя</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
