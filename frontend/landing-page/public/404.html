<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/logo-mark.svg" />
    <meta name="theme-color" content="#1d2417" />
    <meta name="robots" content="noindex, follow" />
    <title>Страница не найдена — LevelUp Academy</title>
    <style>
      :root {
        --ink: #1d2417;
        --lime: #c5f04a;
        --muted: #6b7563;
      }
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        background: #fbfcf9;
        color: var(--ink);
        font-family: 'Manrope', system-ui, -apple-system, 'Segoe UI', sans-serif;
        text-align: center;
      }
      .code {
        font-size: clamp(64px, 14vw, 128px);
        font-weight: 800;
        line-height: 1;
        letter-spacing: -0.03em;
      }
      h1 {
        margin: 16px 0 12px;
        font-size: clamp(22px, 4vw, 32px);
        font-weight: 700;
      }
      p {
        max-width: 46ch;
        margin: 0 auto 28px;
        color: var(--muted);
        line-height: 1.6;
      }
      a {
        display: inline-block;
        padding: 14px 28px;
        border-radius: 999px;
        background: var(--lime);
        color: var(--ink);
        font-weight: 700;
        text-decoration: none;
      }
      a:hover {
        filter: brightness(0.95);
      }
    </style>
  </head>
  <body>
    <main>
      <div class="code">404</div>
      <h1>Такой страницы нет</h1>
      <p>
        Возможно, ссылка устарела или в адресе опечатка. Вернитесь на главную —
        оттуда доступны все разделы LevelUp Academy.
      </p>
      <a href="/landing">На главную</a>
    </main>
  </body>
</html>
