<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- favicon.ico must exist and be linked: Yandex.Webmaster reports "favicon not
         found" for an SVG-only icon, and it fetches the root of the site (which
         308-redirects here), so the raster file is the only signal it accepts.
         Modern browsers still prefer the SVG below. -->
    <link rel="icon" href="/favicon.ico" sizes="32x32" />
    <link rel="icon" type="image/svg+xml" href="/logo-mark.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="theme-color" content="#1d2417" />

    <!-- Yandex.Webmaster ownership verification. Meta method (not the yandex_*.html
         file): vercel.json cleanUrls:true 308-redirects .html paths, which breaks
         Yandex's exact-URL file check. Same code across all verification methods. -->
    <meta name="yandex-verification" content="3fad9273b6b005db" />

    <!-- Warm up the GA connection early (DNS + TLS) so the async tag loads faster. -->
    <link rel="preconnect" href="https://www.googletagmanager.com" />
    <link rel="preconnect" href="https://www.google-analytics.com" crossorigin />

    <!-- Google Analytics (GA4) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-RWCK0B6TXP"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      // SPA: automatic page_view fires only on the first load. We disable it here
      // and emit every page_view manually from the router (src/lib/analytics.js).
      gtag('config', 'G-RWCK0B6TXP', { send_page_view: false });
    </script>

    <!--
      Переменная часть <head> (title, description, robots, canonical, og:url, JSON-LD
      маршрута) впечатывается сюда на этапе сборки — scripts/prerender.js. Тот же набор
      тегов клиентский useSeo обновляет при переходах между роутами.
      Постоянная часть (ниже) в prerender не участвует и одинакова для всех страниц.
    -->
    <!--app-head-->

    <!-- Open Graph — постоянная часть -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="LevelUp Academy" />
    <meta property="og:image" content="https://levelup-academy.uz/og-cover.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="LevelUp Academy — CRM для учебного центра" />

    <!-- Twitter Card — постоянная часть -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="https://levelup-academy.uz/og-cover.png" />

    <!-- Structured data: Organization + WebSite + SoftwareApplication -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@graph": [
          {
            "@type": "Organization",
            "@id": "https://levelup-academy.uz/#organization",
            "name": "LevelUp Academy",
            "alternateName": ["LevelUp Academy CRM", "LevelUp Academy — CRM для учебных центров"],
            "url": "https://levelup-academy.uz",
            "logo": {
              "@type": "ImageObject",
              "url": "https://levelup-academy.uz/logo.png",
              "width": 896,
              "height": 160
            },
            "description": "LevelUp Academy — SaaS-платформа (программное обеспечение, CRM) для управления учебными центрами в Узбекистане. Это IT-продукт для владельцев учебных центров, а не сам учебный центр или IT-школа: финансы и сплит-платежи, посещаемость, тесты и домашние задания, геймификация, чаты и Telegram-уведомления в одной системе.",
            "slogan": "CRM для учебного центра",
            "knowsAbout": [
              "CRM для учебных центров",
              "автоматизация учебного центра",
              "учёт оплат и сплит-платежи",
              "посещаемость (davomat)",
              "управление студентами и группами"
            ],
            "areaServed": { "@type": "Country", "name": "Узбекистан" },
            "foundingLocation": { "@type": "Country", "name": "Узбекистан" }
          },
          {
            "@type": "WebSite",
            "@id": "https://levelup-academy.uz/#website",
            "url": "https://levelup-academy.uz",
            "name": "LevelUp Academy",
            "alternateName": "LevelUp Academy CRM",
            "inLanguage": "ru",
            "publisher": { "@id": "https://levelup-academy.uz/#organization" }
          },
          {
            "@type": "SoftwareApplication",
            "@id": "https://levelup-academy.uz/#software",
            "name": "LevelUp Academy",
            "alternateName": "LevelUp Academy CRM",
            "applicationCategory": "BusinessApplication",
            "applicationSubCategory": "CRM",
            "operatingSystem": "Web",
            "url": "https://levelup-academy.uz",
            "description": "CRM для учебного центра: оплаты и сплит-платежи, посещаемость (davomat), тесты с серверным таймером, коины и лидерборды, realtime-чаты, отчёты и Telegram-бот.",
            "inLanguage": "ru",
            "publisher": { "@id": "https://levelup-academy.uz/#organization" },
            "offers": {
              "@type": "Offer",
              "price": "0",
              "priceCurrency": "UZS",
              "description": "Первая неделя бесплатно, без карты и обязательств."
            }
          }
        ]
      }
    </script>
    <!--
      FAQPage здесь намеренно НЕТ: разметка обязана быть на языке страницы, а этот блок
      общий для ru и uz. Её отдаёт сама страница через useSeo (см. src/lib/seo.js → faqPage).
    -->
  </head>
  <body>
    <div id="root"><!--app-html--></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
